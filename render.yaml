# Render Blueprint — ULSESA Portal
# Deploy at: https://dashboard.render.com/blueprints

services:
  - type: web
    name: ulsesa-portal
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Database (REQUIRED — set these in Render dashboard → Environment)
      - key: DATABASE_URL
        sync: false  # Set to: libsql://ulsesa-dawrld.aws-us-west-2.turso.io
      - key: TURSO_AUTH_TOKEN
        sync: false  # Set to your Turso auth token
      # Auth
      - key: JWT_SECRET
        value: ulse-sa-election-2026
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: ulsesa-admin-2026
      # Email (for OTP — set these to enable real email delivery)
      - key: SMTP_HOST
        sync: false  # smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false  # ulsesa01@gmail.com
      - key: SMTP_PASSWORD
        sync: false  # Gmail App Password
      - key: SMTP_FROM
        value: ULSESA Portal <ulsesa01@gmail.com>

  # One-time job to create database tables + seed data
  - type: job
    name: ulsesa-db-setup
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma db push && npm run seed
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: JWT_SECRET
        value: ulse-sa-election-2026
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: ulsesa-admin-2026
