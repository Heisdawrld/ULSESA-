# Render Blueprint — ULSESA Portal
# This file lets you deploy to Render with one click.
# Go to: https://dashboard.render.com/blueprints → New Blueprint → connect your repo

services:
  - type: web
    name: ulsesa-portal
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURSO_DATABASE_URL
        sync: false  # Set this to your Turso URL (libsql://...) in Render dashboard
      - key: TURSO_AUTH_TOKEN
        sync: false  # Set this to your Turso auth token in Render dashboard
      - key: JWT_SECRET
        value: ulse-sa-election-2026
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: ulsesa-admin-2026
      - key: SMTP_HOST
        sync: false  # Set for email (e.g. smtp.gmail.com)
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false  # Set for email (e.g. ulsesa01@gmail.com)
      - key: SMTP_PASSWORD
        sync: false  # Set your Gmail App Password
      - key: SMTP_FROM
        value: ULSESA Portal <ulsesa01@gmail.com>
      - key: PORT
        value: 10000
